<!DOCTYPE html>
<html>
<head>
    <title>Edit Daily Record</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="update-container">
    <h2>Edit Daily Record</h2>

    <form method="POST">

        <label>Total Inmates</label>
        <input type="number" name="total_inmates"
               value="{{ record.total_inmates }}" required>

        <label>Active Inmates</label>
        <input type="number" name="active_inmates"
               value="{{ record.active_inmates }}" required>

        <label>Male Inmates</label>
        <input type="number" name="male_inmates"
               value="{{ record.male_inmates }}" required>

        <label>Female Inmates</label>
        <input type="number" name="female_inmates"
               value="{{ record.female_inmates }}" required>

        <label>New Admissions</label>
        <input type="number" name="new_inmates"
               value="{{ record.new_inmates }}" required>

        <label>Hospitalized</label>
        <input type="number" name="hospitalized"
               value="{{ record.hospitalized }}" required>

        <label>Discharged</label>
        <input type="number" name="discharged"
               value="{{ record.discharged }}" required>

        <label>Deceased</label>
        <input type="number" name="deceased"
               value="{{ record.deceased }}" required>

        <label>Staff Count</label>
        <input type="number" name="staff_count"
               value="{{ record.staff_count }}" required>

        <label>Guests Arrived</label>
        <input type="number" name="guests_arrived"
               value="{{ record.guests_arrived }}" required>

        <button type="submit" class="btn-primary">Update Record</button>
    </form>

    <br>
    <a href="/admin/update" class="back-btn">← Back</a>

</div>

</body>
</html>
