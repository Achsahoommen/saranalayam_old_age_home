<!DOCTYPE html>
<html>
<head>
    <title>Edit Record</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Edit Record - {{ record[1] }}</h2>

    <form method="POST">

        <label>Total Inmates</label>
        <input type="number" name="total_inmates" value="{{ record[2] }}" required>

        <label>Hospitalized</label>
        <input type="number" name="hospitalized" value="{{ record[3] }}" required>

        <label>Staff Count</label>
        <input type="number" name="staff_count" value="{{ record[4] }}" required>

        <label>Guests Arrived</label>
        <input type="number" name="guests_arrived" value="{{ record[5] }}" required>

        <button type="submit">Update Record</button>
    </form>

    <div class="admin-actions">
        <a href="/admin" class="back-btn">← Back to Dashboard</a>
    </div>
</div>

</body>
</html>
