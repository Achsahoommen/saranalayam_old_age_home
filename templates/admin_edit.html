<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Record | Admin</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="icon" type="image/png" 
          href="{{ url_for('static', filename='images/favicon.png') }}">
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-3xl">

    <!-- Header -->
    <div class="mb-6 text-center">
        <h2 class="text-2xl font-bold text-gray-800">
            Edit Record – {{ record.date }}
        </h2>
        <p class="text-gray-500 text-sm">Update daily statistics below</p>
    </div>

    <form method="POST" class="space-y-6">

        <!-- Inmate Section -->
        <div>
            <h3 class="text-lg font-semibold text-blue-600 mb-3">
                Inmate Details
            </h3>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                <div>
                    <label class="block text-sm font-medium">Total Inmates</label>
                    <input type="number" name="total_inmates"
                           value="{{ record.total_inmates }}"
                           min="0"
                           required
                           class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-blue-400">
                </div>

                <div>
                    <label class="block text-sm font-medium">New Inmates</label>
                    <input type="number" name="new_inmates"
                           value="{{ record.new_inmates }}"
                           min="0"
                           required
                           class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-blue-400">
                </div>

                <div>
                    <label class="block text-sm font-medium">Male Inmates</label>
                    <input type="number" name="male_count"
                           value="{{ record.male_inmates }}"
                           min="0"
                           required
                           class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-blue-400">
                </div>

                <div>
                    <label class="block text-sm font-medium">Female Inmates</label>
                    <input type="number" name="female_count"
                           value="{{ record.female_inmates }}"
                           min="0"
                           required
                           class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-blue-400">
                </div>

            </div>
        </div>

        <!-- Status Section -->
        <div>
            <h3 class="text-lg font-semibold text-red-600 mb-3">
                Status Updates
            </h3>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                <div>
                    <label class="block text-sm font-medium">Discharged</label>
                    <input type="number" name="discharged"
                           value="{{ record.discharged }}"
                           min="0"
                           required
                           class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-red-400">
                </div>

                <div>
                    <label class="block text-sm font-medium">Hospitalized</label>
                    <input type="number" name="hospitalized"
                           value="{{ record.hospitalized }}"
                           min="0"
                           required
                           class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-red-400">
                </div>

            </div>
        </div>

        <!-- Staff & Visitors -->
        <div>
            <h3 class="text-lg font-semibold text-green-600 mb-3">
                Staff & Visitors
            </h3>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                <div>
                    <label class="block text-sm font-medium">Staff Count</label>
                    <input type="number" name="staff_count"
                           value="{{ record.staff_count }}"
                           min="0"
                           required
                           class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-green-400">
                </div>

                <div>
                    <label class="block text-sm font-medium">Guests Arrived</label>
                    <input type="number" name="guests_arrived"
                           value="{{ record.guests_arrived }}"
                           min="0"
                           required
                           class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-green-400">
                </div>

            </div>
        </div>

        <!-- Buttons -->
        <div class="flex justify-between items-center pt-6">

            <a href="/admin/update"
               class="px-4 py-2 bg-gray-400 text-white rounded-lg hover:bg-gray-500 transition">
               ← Back
            </a>

            <button type="submit"
                    class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition shadow-md">
                Update Record
            </button>

        </div>

    </form>

</div>

</body>
</html>
