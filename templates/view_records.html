<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Past Records</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Past Daily Records</h2>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Total Inmates</th>
                <th>Hospitalized</th>
                <th>Staff Count</th>
                <th>Guests Arrived</th>
            </tr>
        </thead>
        <tbody>
            {% for record in records %}
            <tr>
                <td>{{ record['date'] }}</td>
                <td>{{ record['total_inmates'] }}</td>
                <td>{{ record['hospitalized'] }}</td>
                <td>{{ record['staff_count'] }}</td>
                <td>{{ record['guests_arrived'] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

   <div class="admin-actions">
        <a href="/admin" class="back-btn">← Back to Dashboard</a>
    </div>
</div>

</body>
</html>
