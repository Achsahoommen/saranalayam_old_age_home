<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- IMPORTANT FOR MOBILE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Donate | Sharanstan Old Age Home</title>

<link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* GLOBAL */

body{
font-family:"Segoe UI",Arial,sans-serif;
margin:0;
background:#F9FAF7;
color:#3F3F46;
}

/* NAVBAR */

.navbar{
display:flex;
align-items:center;
justify-content:space-between;
background:#2f7d6a;
padding:15px 25px;
}

.logo img{
height:60px;
}

.nav-links{
display:flex;
gap:20px;
}

.nav-links a{
color:white;
text-decoration:none;
font-weight:600;
}

.nav-links a:hover{
text-decoration:underline;
}

/* HAMBURGER */

.hamburger-btn{
display:none;
background:none;
border:none;
color:white;
font-size:26px;
cursor:pointer;
}

/* MOBILE MENU */

.mobile-nav{
display:none;
flex-direction:column;
background:#256354;
padding:10px 20px 20px;
}

.mobile-nav.open{
display:flex;
}

.mobile-nav a{
color:white;
padding:12px 0;
text-decoration:none;
font-weight:600;
border-bottom:1px solid rgba(255,255,255,0.2);
}

/* DONATION CONTAINER */

.donation-container{
max-width:900px;
margin:50px auto;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.donation-container h2{
color:#2F7D6A;
margin-bottom:20px;
}

.donation-row{
display:flex;
gap:15px;
margin-bottom:15px;
}

input,select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
margin-bottom:15px;
}

.donation-next-btn{
background:#2F7D6A;
color:white;
border:none;
padding:12px 25px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.donation-next-btn:hover{
background:#3FA584;
}

/* BACK BUTTON */

.back-dashboard-container{
margin-top:25px;
text-align:center;
}

.back-dashboard-btn{
text-decoration:none;
background:#e6f2ef;
color:#2F7D6A;
padding:10px 20px;
border-radius:8px;
font-weight:600;
}

/* MOBILE */

@media(max-width:768px){

.nav-links{
display:none;
}

.hamburger-btn{
display:block;
}

/* stack form inputs */

.donation-row{
flex-direction:column;
}

.donation-container{
margin:20px;
padding:25px;
}

}
</style>
</head>
<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
<img src="{{ url_for('static', filename='images/logo1.png') }}">
</div>

<div class="nav-links">
<a href="/">Home</a>
<a href="/about">About Us</a>
<a href="/faq">FAQ</a>
<a href="/blog">Blogs</a>
<a href="/donate">Donate</a>
<a href="/login">Login</a>
</div>

<button class="hamburger-btn" onclick="toggleMenu()">
<i class="fa-solid fa-bars"></i>
</button>

</div>

<!-- MOBILE MENU -->

<div class="mobile-nav" id="mobileNav">

<a href="/"><i class="fa-solid fa-house"></i> Home</a>
<a href="/about"><i class="fa-solid fa-circle-info"></i> About</a>
<a href="/faq"><i class="fa-solid fa-question"></i> FAQ</a>
<a href="/blog"><i class="fa-solid fa-newspaper"></i> Blogs</a>
<a href="/donate"><i class="fa-solid fa-heart"></i> Donate</a>
<a href="/login"><i class="fa-solid fa-user"></i> Login</a>

</div>

{% if 'user' in session %}
<div class="donation-container">
<h2>Welcome {{ session['user'] }}</h2>
<h2>Donation – Personal Information</h2>
<form action="/donate" method="post">
<label>Name</label>
<div class="donation-row">
<input name="first_name" placeholder="First Name" required>
<input name="last_name" placeholder="Last Name" required>
</div>
<label>Address</label>
<input name="address1" placeholder="Street Address" required>
<input name="address2" placeholder="Street Address Line 2">
<div class="donation-row">
<input name="city" placeholder="City" required>
<input name="region" placeholder="Region / State">
</div>
<div class="donation-row">
<input name="zip" placeholder="Postal / Zip Code">
<select name="country" id="countrySelect" onchange="toggleOtherCountry()">
<option value="">Select Country</option>
<option>India</option>
<option>United States</option>
<option>United Kingdom</option>
<option>Australia</option>
<option>Canada</option>
<option value="other">Other</option>
</select>
<input type="text" name="custom_country" id="customCountry"
placeholder="Enter your country" style="display:none;">
</div>
<label>Email</label>
<input type="email" name="email" placeholder="Email Address" required>
<label>Phone</label>
<div class="donation-row">
<select name="country_code" id="countryCodeSelect"
onchange="toggleOtherCode()">
<option value="+91">+91 (India)</option>
<option value="+1">+1 (USA)</option>
<option value="+44">+44 (UK)</option>
<option value="other">Other</option>
</select>
<input type="text" name="custom_country_code"
id="customCountryCode"
placeholder="Enter country code"
style="display:none;">
<input type="tel" name="phone"
placeholder="Phone Number" required>
</div>
<button class="donation-next-btn">Next</button>
</form>
<div class="back-dashboard-container">
<a href="/user-dashboard" class="back-dashboard-btn">
← Back to Dashboard
</a>
</div>
</div>
{% else %}
<div class="donation-container" style="text-align:center; padding:60px;">
<h2><i class="fa-solid fa-hand-holding-heart"></i> Make a Donation</h2>
<p>Please <a href="/login">Login</a> to donate</p>
</div>
{% endif %}
<script>
function toggleMenu(){
document.getElementById("mobileNav").classList.toggle("open")
}
function toggleOtherCountry(){
const select=document.getElementById("countrySelect")
const input=document.getElementById("customCountry")
if(select.value==="other"){
input.style.display="block"
}else{
input.style.display="none"
}
}
function toggleOtherCode(){
const select=document.getElementById("countryCodeSelect")
const input=document.getElementById("customCountryCode")
if(select.value==="other"){
input.style.display="block"
}else{
input.style.display="none"
}
}
</script>
</body>
</html>
