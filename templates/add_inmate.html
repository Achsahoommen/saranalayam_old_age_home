<!DOCTYPE html>
<html>
<head>
    <title>Add Inmate</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <script>
        function toggleDeathDate() {
            var status = document.getElementById("status").value;
            var deathField = document.getElementById("death-date-field");

            if (status === "Deceased") {
                deathField.style.display = "block";
            } else {
                deathField.style.display = "none";
            }
        }
    </script>
</head>
<body>

<div class="container">
    <h2>Add New Inmate</h2>

    <form method="POST">

        <label>Full Name</label>
        <input type="text" name="name" required>

        <label>Age</label>
        <input type="number" name="age" required>

        <label>Gender</label>
        <select name="gender" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
        </select>

        <!-- STATUS FIELD -->
        <label>Status</label>
        <select name="status" id="status" onchange="toggleDeathDate()" required>
            <option value="">Select Status</option>
            <option value="Active">Active</option>
            <option value="Hospitalized">Hospitalized</option>
            <option value="Discharged">Discharged</option>
            <option value="Deceased">Deceased</option>
        </select>

        <!-- DATE OF DEATH (Hidden by default) -->
        <div id="death-date-field" style="display:none;">
            <label>Date of Death</label>
            <input type="date" name="date_of_death">
        </div>

        <label>Admission Date</label>
        <input type="date" name="admission_date" required>

        <label>Medical Condition</label>
        <input type="text" name="illness">

        <label>Hospital Details</label>
        <input type="text" name="hospital_details">

        <label>Additional Notes</label>
        <textarea name="notes" rows="3"></textarea>

        <button type="submit">Add Inmate</button>
    </form>

    <br>
    <a href="/admin/inmates" class="back-btn">← Back to Inmates</a>

</div>

</body>
</html>
