<!DOCTYPE html>
<html>
<head>
    <title>Add Inmate</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Add New Inmate</h2>

    <form method="POST">

        <label>Full Name</label>
        <input type="text" name="name" required>

        <label>Age</label>
        <input type="number" name="age" required>

        <label>Gender</label>
        <select name="gender" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
        </select>

        <label>Admission Date</label>
        <input type="date" name="admission_date" required>

        <label>Medical Condition</label>
        <input type="text" name="illness">

        <label>Hospital Details</label>
        <input type="text" name="hospital_details">

        <label>Additional Notes</label>
        <textarea name="notes" rows="3"></textarea>

        <button type="submit">Add Inmate</button>
    </form>

    <br>
    <a href="/admin/inmates" class="back-btn">← Back to Inmates</a>

</div>

</body>
</html>
