<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donation Details | Sharanstan Old Age Home</title>
<link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
/* PAGE */
body{
font-family: "Segoe UI", Arial, sans-serif;
background:#F9FAF7;
margin:0;
padding:0;
}
/* CONTAINER */
.donation-container{
max-width:500px;
margin:60px auto;
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}
/* TITLE */
.donation-container h2{
text-align:center;
margin-bottom:30px;
color:#2f7d6a;
}
/* LABELS */
label{
font-weight:600;
display:block;
margin-top:15px;
margin-bottom:6px;
}
/* INPUTS */
input,
select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
box-sizing:border-box;
}
/* BUTTON */
.donation-next-btn{
width:100%;
margin-top:25px;
padding:14px;
background:#2f7d6a;
color:white;
border:none;
border-radius:6px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}
.donation-next-btn:hover{
background:#256354;
}
/* DASHBOARD BUTTON */
.back-dashboard-container{
text-align:center;
margin-top:20px;
}
.back-dashboard-btn{
text-decoration:none;
color:#2f7d6a;
font-weight:600;
}
/* MOBILE */
@media(max-width:768px){
.donation-container{
margin:20px;
padding:25px;
}
input,
select{
font-size:16px;
}
.donation-next-btn{
font-size:17px;
}
}
</style>

</head>
<body>
<div class="donation-container">
<h2>Donation – Step 2</h2>
<form action="/donate-step-2" method="POST">
<label>Amount (INR)</label>
<input type="number" name="amount" placeholder="Enter amount" required min="1">
<label>Purpose</label>
<select name="purpose" id="purpose" required>
<option value="General Support">General Support</option>
<option value="Food & Nutrition">Food & Nutrition</option>
<option value="Medical Care">Medical Care</option>
<option value="Other">Other</option>
</select>
<input 
type="text"
name="other_purpose"
id="otherPurposeInput"
placeholder="Please specify the purpose"
style="display:none; margin-top:10px;"
>
<label>Payment Method</label>
<select name="payment_method" required>
<option value="Razorpay">Razorpay</option>
</select>
<button type="submit" class="donation-next-btn">
Donate Now
</button>
</form>
<div class="back-dashboard-container">
<a href="/user-dashboard" class="back-dashboard-btn">
← Back to Dashboard
</a>
</div>
</div>

<script>
document.getElementById("purpose").addEventListener("change", function () {
const otherInput = document.getElementById("otherPurposeInput");
if(this.value === "Other"){
otherInput.style.display = "block";
otherInput.required = true;
}else{
otherInput.style.display = "none";
otherInput.required = false;
otherInput.value = "";
}

});

</script>
</body>
</html>
