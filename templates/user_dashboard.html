<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Dashboard</title>
<link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>

/* PAGE */
.user-page{
background:#F9FAF7;
font-family:"Segoe UI", Arial, sans-serif;
padding:30px;
}

/* CONTAINER */
.user-dashboard-container{
max-width:900px;
margin:auto;
}

/* HEADER */
.user-header{
text-align:center;
margin-bottom:40px;
}

.user-header h2{
font-size:30px;
margin-bottom:6px;
color:#2f7d6a;
}

.user-header p{
color:#666;
font-size:15px;
}

/* GRID */
.user-grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

/* CARD */
.user-action-card{
flex:0 0 260px;
background:white;
padding:28px;
border-radius:14px;
box-shadow:0 8px 22px rgba(0,0,0,0.08);
text-align:center;
text-decoration:none;
color:#333;
transition:all 0.25s ease;
}

/* HOVER */
.user-action-card:hover{
transform:translateY(-6px);
box-shadow:0 14px 30px rgba(0,0,0,0.12);
}

/* ICON */
.user-action-card .icon{
font-size:38px;
margin-bottom:12px;
}

/* TITLE */
.user-action-card h3{
margin-bottom:6px;
color:#2f7d6a;
}

/* TEXT */
.user-action-card p{
font-size:14px;
color:#666;
}

/* LOGOUT STYLE */
.logout-card{
background:#ffe9e9;
}

.logout-card h3{
color:#c0392b;
}

/* MOBILE */
@media(max-width:600px){

.user-page{
padding:20px;
}

.user-header h2{
font-size:24px;
}

/* 2 cards per row */
.user-action-card{
flex:0 0 calc(50% - 15px);
}

/* logout centered */
.logout-card{
flex:0 0 60%;
margin:auto;
}

}

</style>
</head>

<body class="user-page">

<div class="user-dashboard-container">

<div class="user-header">
<h2>Welcome {{ session['user'] }}</h2>
<p>Manage your donations and account from here.</p>
</div>

<div class="user-grid">

<a href="/donate" class="user-action-card">
<div class="icon">💰</div>
<h3>Donate</h3>
<p>Make a new donation</p>
</a>

<a href="/my-donations" class="user-action-card">
<div class="icon">📄</div>
<h3>My Donations</h3>
<p>View your past donations</p>
</a>

<a href="/faq" class="user-action-card">
<div class="icon">❓</div>
<h3>FAQ</h3>
<p>Frequently asked questions</p>
</a>

<a href="/view-replies" class="user-action-card">
<div class="icon">📩</div>
<h3>View Replies</h3>
<p>See admin responses</p>
</a>

<a href="/logout" class="user-action-card logout-card">
<div class="icon">🚪</div>
<h3>Logout</h3>
<p>Securely exit your account</p>
</a>

</div>
</div>

</body>
</html>
