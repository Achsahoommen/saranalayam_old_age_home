<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login – Sharanstan Old Age Home</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="admin-login">

<div class="login-container">

    <div class="login-logo">
        <i class="fas fa-user"></i>
    </div>

   <form method="POST">
    
    {% if request.args.get('message') %}
        <p style="color: #155724; background-color: #d4edda; border: 1px solid #c3e6cb; padding: 10px; border-radius: 5px; font-size: 14px; margin-bottom: 15px; text-align: center;">
            <i class="fas fa-check-circle"></i> {{ request.args.get('message') }}
        </p>
    {% endif %}

    <label>Email</label>
    <input type="text" name="identifier" placeholder="Email" required>

    <label>Password</label>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Login</button>

    <div class="forgot-link">
        <a href="/forgot-password">Forgot Password?</a>
    </div>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
</form>

    <div class="login-footer">
        <p>New user? <a href="/register">Register</a></p>
        <p><a href="/">← Go to Sharanstan</a></p>
    </div>

</div>

<script>
function togglePassword() {
    const pwd = document.getElementById("password");
    pwd.type = pwd.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
