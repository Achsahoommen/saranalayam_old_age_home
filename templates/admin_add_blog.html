<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Blog | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-6xl mx-auto px-4 py-12">
        <nav class="mb-8 flex items-center text-sm text-gray-500 space-x-2">
            <a href="/admin" class="hover:text-blue-600">Admin Dashboard</a>
            <span>/</span>
            <span class="text-gray-800 font-medium">Blog Management</span>
        </nav>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden sticky top-8">
                    <div class="{{ 'bg-orange-500' if edit_post else 'bg-blue-600' }} px-6 py-4">
                        <h1 class="text-xl font-bold text-white">
                            {{ 'Edit Post' if edit_post else 'New Post' }}
                        </h1>
                    </div>
                    <form action="/admin/add-blog" method="POST" enctype="multipart/form-data" class="p-6 space-y-4">
                        <input type="hidden" name="post_id" value="{{ edit_post.id if edit_post else '' }}">
                        <input type="hidden" name="old_image" value="{{ edit_post.image_filename if edit_post else '' }}">

                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Title</label>
                            <input type="text" name="title" value="{{ edit_post.title if edit_post else '' }}" required 
                                   class="w-full px-3 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Image (Optional)</label>
                            <input type="file" name="image" class="w-full text-xs text-gray-500">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Content</label>
                            <textarea name="content" rows="8" required 
                                      class="w-full px-3 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none text-sm">{{ edit_post.content if edit_post else '' }}</textarea>
                        </div>
                        
                        <button type="submit" class="w-full {{ 'bg-orange-500 hover:bg-orange-600' if edit_post else 'bg-blue-600 hover:bg-blue-700' }} text-white font-bold py-3 rounded-xl transition shadow-md">
                            {{ 'Update Post' if edit_post else 'Publish Post' }}
                        </button>
                        {% if edit_post %}
                        <a href="/admin/add-blog" class="block text-center text-xs text-gray-400 mt-2 hover:underline">Cancel Edit</a>
                        {% endif %}
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
                    <div class="px-6 py-4 border-b flex justify-between items-center">
                        <h2 class="text-xl font-bold text-gray-800">Published Posts</h2>
                    </div>
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-gray-400 text-xs uppercase font-bold">
                            <tr>
                                <th class="px-6 py-4">Post Info</th>
                                <th class="px-6 py-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 text-sm">
                            {% for post in posts %}
                            <tr class="hover:bg-gray-50">
                                <td class="px-6 py-4">
                                    <div class="flex items-center space-x-3">
                                        <div class="font-bold text-gray-800 line-clamp-1">{{ post.title }}</div>
                                    </div>
                                </td>
                                <td class="px-6 py-4 text-right space-x-2">
                                    <a href="/admin/edit-blog/{{ post.id }}" class="text-blue-500 hover:bg-blue-50 p-2 rounded-lg transition">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>
                                    <a href="/admin/delete-blog/{{ post.id }}" onclick="return confirm('Delete this post?')" class="text-red-500 hover:bg-red-50 p-2 rounded-lg transition">
                                        <i class="fa-solid fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
