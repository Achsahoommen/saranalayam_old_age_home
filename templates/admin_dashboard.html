<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="admin-page">

<div class="admin-container">

    <div class="admin-header">
        <h1>Admin Dashboard</h1>
        <p>Welcome back, Admin 👋</p>
        <span>Manage donations, daily records, and system updates</span>
    </div>

    <div class="admin-grid">

        <a href="/admin/donations" class="admin-card">
            <div class="icon">💰</div>
            <h3>View Donations</h3>
            <p>Check all donation transactions</p>
        </a>

        <a href="/admin/update" class="admin-card">
            <div class="icon">📝</div>
            <h3>Update Daily Records</h3>
            <p>Modify staff, guest & medical data</p>
        </a>

        <a href="/logout" class="admin-card logout-card">
            <div class="icon">🚪</div>
            <h3>Logout</h3>
            <p>Securely exit admin panel</p>
        </a>

    </div>

</div>

</body>
</html>
